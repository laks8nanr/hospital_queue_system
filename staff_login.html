<!-- Staff Login Page -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediNova Hospital - Staff Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a4d68 0%, #088395 50%, #05bfdb 100%);
      display: flex; flex-direction: column; align-items: center; padding: 20px;
    }
    .header { display: flex; justify-content: center; padding: 20px 0 30px; }
    .logo-container { display: flex; align-items: center; gap: 15px; }
    .logo-symbol {
      width: 55px; height: 55px;
      background: linear-gradient(135deg, #fff 0%, #e0f7fa 100%);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
    .logo-text { color: white; }
    .logo-title { font-size: 1.6rem; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
    .logo-subtitle { font-size: 0.8rem; opacity: 0.9; letter-spacing: 2px; text-transform: uppercase; }
    .main-container {
      max-width: 420px; width: 100%;
      background: white; border-radius: 25px;
      padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .page-title { text-align: center; margin-bottom: 30px; }
    .page-title h2 { color: #0a4d68; font-size: 1.5rem; font-weight: 600; }
    .page-title p { color: #666; font-size: 0.9rem; margin-top: 5px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 600; color: #2c3e50; margin-bottom: 8px; }
    .form-group input {
      width: 100%; padding: 14px 16px; border: 2px solid #ddd; border-radius: 12px;
      font-size: 1rem; font-family: 'Poppins', sans-serif; transition: border-color 0.3s;
    }
    .form-group input:focus { outline: none; border-color: #088395; }
    .error-message { color: #e74c3c; font-size: 0.9rem; margin-bottom: 15px; text-align: center; }
    .login-btn {
      width: 100%; padding: 16px; background: linear-gradient(135deg, #088395, #0a4d68);
      color: white; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 600;
      cursor: pointer; transition: all 0.3s; font-family: 'Poppins', sans-serif;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(8,131,149,0.4); }
    .forgot-link { display: block; text-align: center; margin-top: 20px; color: #088395; text-decoration: none; font-size: 0.9rem; }
    .forgot-link:hover { text-decoration: underline; }
    .back-link { display: block; text-align: center; margin-top: 25px; color: white; text-decoration: none; font-weight: 500; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <div class="logo-symbol">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 3H15V9H21V15H15V21H9V15H3V9H9V3Z" fill="#0a4d68" stroke="#088395" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-title">MediNova Hospital</div>
        <div class="logo-subtitle">Smart Healthcare</div>
      </div>
    </div>
  </div>

  <div class="main-container">
    <div class="page-title">
      <h2>👨‍⚕️ Staff Login</h2>
      <p>Access your dashboard</p>
    </div>

    <form id="staffLoginForm" onsubmit="return handleStaffLogin(event)">
      <div class="form-group">
        <label for="staffId">Staff ID</label>
        <input type="text" id="staffId" name="staffId" placeholder="Enter your Staff ID" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>
      
      <div class="error-message" id="errorMsg"></div>
      
      <button type="submit" class="login-btn">🔐 Login</button>
      
      <a href="forgot_password.html?type=staff" class="forgot-link">Forgot Password?</a>
    </form>
  </div>

  <a href="home.html" class="back-link">← Back to Home</a>

<script>
  function handleStaffLogin(event) {
    event.preventDefault();
    
    const staffId = document.getElementById('staffId').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    
    if (!staffId || !password) {
      errorMsg.textContent = 'Please enter Staff ID and Password';
      return false;
    }

    fetch('api/staff_login.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ staff_id: staffId, password: password })
    })
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        sessionStorage.setItem('staffId', data.data.staff_id);
        sessionStorage.setItem('staffName', data.data.name);
        sessionStorage.setItem('staffDepartment', data.data.department);
        sessionStorage.setItem('staffDepartmentId', data.data.department_id);
        sessionStorage.setItem('doctorId', data.data.doctor_id);
        sessionStorage.setItem('userType', 'staff');
        sessionStorage.setItem('staffData', JSON.stringify({
          id: data.data.id, staff_id: data.data.staff_id, staff_name: data.data.name,
          department: data.data.department, department_id: data.data.department_id, doctor_id: data.data.doctor_id
        }));
        window.location.href = 'staff_dashboard.html';
      } else {
        errorMsg.textContent = data.message;
      }
    })
    .catch(error => {
      errorMsg.textContent = 'Login failed. Please try again.';
      console.error('Error:', error);
    });
    return false;
  }
</script>
</body>
</html>
