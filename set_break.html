<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Set Break</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Set Break Page Styles */
    body.break-body {
      background: #f0f8ff;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .break-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      max-width: 420px;
      width: 100%;
      padding: 32px 24px;
      text-align: center;
    }

    .page-title {
      font-size: 26px;
      font-weight: 700;
      color: #2c3e50;
      margin: 0 0 24px 0;
      letter-spacing: -0.3px;
    }

    /* Current Time Display */
    .time-display {
      font-size: 48px;
      font-weight: 700;
      color: #2980b9;
      font-family: 'Courier New', monospace;
      margin-bottom: 28px;
      letter-spacing: 2px;
    }

    /* Status Indicator */
    .status-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 10px;
    }

    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #27ae60;
      transition: background 0.3s ease;
    }

    .status-text {
      font-size: 15px;
      font-weight: 600;
      color: #2c3e50;
    }

    /* Break Times Section */
    .break-times {
      background: #f9fafb;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 28px;
      text-align: left;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .time-row:last-child {
      margin-bottom: 0;
    }

    .time-label {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      color: #7f8c8d;
      letter-spacing: 0.5px;
    }

    .time-input {
      font-size: 16px;
      font-weight: 600;
      color: #2c3e50;
      font-family: 'Courier New', monospace;
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      min-width: 120px;
      text-align: center;
      transition: border-color 0.3s;
    }

    .time-input:focus {
      outline: none;
      border-color: #3498db;
    }

    .time-value {
      font-size: 16px;
      font-weight: 600;
      color: #2c3e50;
      font-family: 'Courier New', monospace;
      min-width: 100px;
      text-align: right;
    }

    .time-value.empty {
      color: #bdc3c7;
      font-weight: 400;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 140px;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-break {
      background: linear-gradient(135deg, #17a2b8, #138496);
      color: white;
    }

    .btn-break:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(23, 162, 184, 0.3);
    }

    .btn-break:disabled {
      background: #d5e8ea;
      color: #95a5a6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-over {
      background: #ecf0f1;
      color: #7f8c8d;
    }

    .btn-over:hover:not(:disabled) {
      background: #27ae60;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(39, 174, 96, 0.3);
    }

    .btn-over:disabled {
      background: #d5e8ea;
      color: #95a5a6;
      cursor: not-allowed;
    }

    .btn-emergency {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      width: 100%;
      font-size: 16px;
    }

    .btn-emergency:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(231, 76, 60, 0.4);
    }

    .btn-resume {
      background: linear-gradient(135deg, #27ae60, #1e8449);
      color: white;
      font-size: 16px;
    }

    .btn-resume:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(39, 174, 96, 0.4);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .break-container {
        padding: 24px 16px;
      }

      .page-title {
        font-size: 22px;
        margin-bottom: 20px;
      }

      .time-display {
        font-size: 40px;
        margin-bottom: 24px;
      }

      .action-buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        min-width: auto;
      }
    }
  </style>
</head>
<body class="break-body">
  <div class="break-container">
    <!-- Page Title -->
    <div class="page-title">Set Break</div>

    <!-- Current Time Display -->
    <div class="time-display" id="currentTime">12:00 PM</div>

    <!-- Status Indicator -->
    <div class="status-section">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Available</div>
    </div>

    <!-- Break Times Section -->
    <div class="break-times">
      <div class="time-row">
        <div class="time-label">Break Start Time</div>
        <input type="time" class="time-input" id="breakStartInput">
      </div>
      <div class="time-row">
        <div class="time-label">Break End Time</div>
        <input type="time" class="time-input" id="breakEndInput">
      </div>
      <div class="time-row" id="durationRow" style="display: none;">
        <div class="time-label">Break Duration</div>
        <div class="time-value" id="breakDuration">0 mins</div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button class="btn btn-break" id="setBreakBtn">Set Break</button>
      <button class="btn btn-over" id="cancelBreakBtn">Cancel Break</button>
    </div>

    <!-- Emergency Button -->
    <div style="margin-top: 16px; display: flex; gap: 12px;">
      <button class="btn btn-emergency" id="emergencyBtn" style="flex: 1;">🚨 Emergency</button>
      <button class="btn btn-resume" id="resumeBtn" style="flex: 1; display: none;">▶ Resume</button>
    </div>

    <!-- Back Button -->
    <div style="margin-top: 20px;">
      <button class="btn" id="backBtn" style="background: #ecf0f1; color: #2c3e50; width: 100%;">← Back to Dashboard</button>
    </div>
  </div>

  <script>
    // Break State
    let breakState = {
      doctorId: null,
      hasActiveBreak: false
    };

    // Get doctor_id from URL
    function getDoctorId() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('doctor_id') || sessionStorage.getItem('doctorId');
    }

    // Update current time display every second
    function updateCurrentTime() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        second: undefined,
        hour12: true
      });
      document.getElementById('currentTime').textContent = time;
    }

    // Calculate and display break duration
    function calculateDuration() {
      const startInput = document.getElementById('breakStartInput').value;
      const endInput = document.getElementById('breakEndInput').value;
      const durationRow = document.getElementById('durationRow');
      const durationEl = document.getElementById('breakDuration');
      
      if (startInput && endInput) {
        const [startH, startM] = startInput.split(':').map(Number);
        const [endH, endM] = endInput.split(':').map(Number);
        
        let durationMins = (endH * 60 + endM) - (startH * 60 + startM);
        
        if (durationMins > 0) {
          durationRow.style.display = 'flex';
          if (durationMins >= 60) {
            const hours = Math.floor(durationMins / 60);
            const mins = durationMins % 60;
            durationEl.textContent = `${hours}h ${mins}m`;
          } else {
            durationEl.textContent = `${durationMins} mins`;
          }
        } else {
          durationRow.style.display = 'none';
        }
      } else {
        durationRow.style.display = 'none';
      }
    }

    // Load break status from API
    async function loadBreakStatus() {
      if (!breakState.doctorId) return;
      
      try {
        const response = await fetch(`api/manage_break.php?doctor_id=${breakState.doctorId}`);
        const data = await response.json();
        
        if (data.success && data.data.is_on_break) {
          breakState.hasActiveBreak = true;
          // Populate inputs with existing break times
          if (data.data.break_start) {
            const start = new Date(data.data.break_start);
            document.getElementById('breakStartInput').value = 
              start.getHours().toString().padStart(2,'0') + ':' + 
              start.getMinutes().toString().padStart(2,'0');
          }
          if (data.data.break_end) {
            const end = new Date(data.data.break_end);
            document.getElementById('breakEndInput').value = 
              end.getHours().toString().padStart(2,'0') + ':' + 
              end.getMinutes().toString().padStart(2,'0');
          }
          calculateDuration();
          updateUI();
        }
      } catch (error) {
        console.error('Error loading break status:', error);
      }
    }

    // Update UI based on break state
    function updateUI() {
      const setBreakBtn = document.getElementById('setBreakBtn');
      const cancelBreakBtn = document.getElementById('cancelBreakBtn');
      const emergencyBtn = document.getElementById('emergencyBtn');
      const resumeBtn = document.getElementById('resumeBtn');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');

      if (breakState.hasActiveBreak) {
        statusDot.style.background = '#e74c3c';
        statusText.textContent = '🚨 Break Active';
        setBreakBtn.textContent = 'Update Break';
        cancelBreakBtn.style.display = 'block';
        emergencyBtn.style.display = 'none';
        resumeBtn.style.display = 'block';
      } else {
        statusDot.style.background = '#27ae60';
        statusText.textContent = 'Available';
        setBreakBtn.textContent = 'Set Break';
        cancelBreakBtn.style.display = 'none';
        emergencyBtn.style.display = 'block';
        resumeBtn.style.display = 'none';
      }
    }

    // Set Break button clicked
    async function onSetBreakClick() {
      const startInput = document.getElementById('breakStartInput').value;
      const endInput = document.getElementById('breakEndInput').value;
      
      if (!startInput || !endInput) {
        alert('Please select both start and end times');
        return;
      }
      
      const [startH, startM] = startInput.split(':').map(Number);
      const [endH, endM] = endInput.split(':').map(Number);
      const durationMins = (endH * 60 + endM) - (startH * 60 + startM);
      
      if (durationMins <= 0) {
        alert('End time must be after start time');
        return;
      }
      
      try {
        const today = new Date().toISOString().split('T')[0];
        const response = await fetch('api/manage_break.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            doctor_id: breakState.doctorId,
            action: 'set_break',
            break_start: `${today} ${startInput}:00`,
            break_end: `${today} ${endInput}:00`
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          breakState.hasActiveBreak = true;
          updateUI();
          alert(`Break set! ${data.patients_updated || 0} patient(s) queue times updated.`);
        } else {
          alert(data.message || 'Failed to set break');
        }
      } catch (error) {
        console.error('Error setting break:', error);
        alert('Error setting break');
      }
    }

    // Cancel Break button clicked
    async function onCancelBreakClick() {
      if (!confirm('Cancel the scheduled break?')) return;
      
      try {
        const response = await fetch('api/manage_break.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            doctor_id: breakState.doctorId,
            action: 'cancel_break'
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          breakState.hasActiveBreak = false;
          document.getElementById('breakStartInput').value = '';
          document.getElementById('breakEndInput').value = '';
          document.getElementById('durationRow').style.display = 'none';
          updateUI();
          alert('Break cancelled');
        } else {
          alert(data.message || 'Failed to cancel break');
        }
      } catch (error) {
        console.error('Error cancelling break:', error);
        alert('Error cancelling break');
      }
    }

    // Go back to dashboard
    function goBack() {
      window.location.href = 'staff_dashboard.html';
    }

    // Emergency button clicked - immediate indefinite break
    async function onEmergencyClick() {
      if (!confirm('Declare an EMERGENCY? This will pause the queue indefinitely until you click Resume.')) return;
      
      try {
        const response = await fetch('api/manage_break.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            doctor_id: breakState.doctorId,
            action: 'start_break'
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          breakState.hasActiveBreak = true;
          updateUI();
          alert('Emergency declared! Queue is paused. Click Resume when ready to continue.');
        } else {
          alert(data.message || 'Failed to declare emergency');
        }
      } catch (error) {
        console.error('Error declaring emergency:', error);
        alert('Error declaring emergency');
      }
    }

    // Resume button clicked - end break/emergency
    async function onResumeClick() {
      try {
        const response = await fetch('api/manage_break.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            doctor_id: breakState.doctorId,
            action: 'end_break'
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          breakState.hasActiveBreak = false;
          document.getElementById('breakStartInput').value = '';
          document.getElementById('breakEndInput').value = '';
          document.getElementById('durationRow').style.display = 'none';
          updateUI();
          alert('Resumed! Queue is now active.');
        } else {
          alert(data.message || 'Failed to resume');
        }
      } catch (error) {
        console.error('Error resuming:', error);
        alert('Error resuming');
      }
    }

    // Setup event listeners
    function init() {
      breakState.doctorId = getDoctorId();
      
      if (!breakState.doctorId) {
        alert('Please login first to access this page.');
        window.location.href = 'staff_login.html';
        return;
      }
      
      document.getElementById('setBreakBtn').addEventListener('click', onSetBreakClick);
      document.getElementById('cancelBreakBtn').addEventListener('click', onCancelBreakClick);
      document.getElementById('emergencyBtn').addEventListener('click', onEmergencyClick);
      document.getElementById('resumeBtn').addEventListener('click', onResumeClick);
      document.getElementById('breakStartInput').addEventListener('change', calculateDuration);
      document.getElementById('breakEndInput').addEventListener('change', calculateDuration);
      
      const backBtn = document.getElementById('backBtn');
      if (backBtn) {
        backBtn.addEventListener('click', goBack);
      }

      // Set default times (current time to +1 hour)
      const now = new Date();
      const startTime = now.getHours().toString().padStart(2,'0') + ':' + 
                        now.getMinutes().toString().padStart(2,'0');
      const endTime = (now.getHours() + 1).toString().padStart(2,'0') + ':' + 
                      now.getMinutes().toString().padStart(2,'0');
      document.getElementById('breakStartInput').value = startTime;
      document.getElementById('breakEndInput').value = endTime;
      calculateDuration();

      updateCurrentTime();
      setInterval(updateCurrentTime, 1000);
      loadBreakStatus();
      updateUI();
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
