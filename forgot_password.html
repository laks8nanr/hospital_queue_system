<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - MediNova Hospital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #0a4d68 0%, #088395 50%, #05bfdb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .header h1 {
            color: #0a4d68;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #088395;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #0a4d68 0%, #088395 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(8, 131, 149, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #088395;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        /* Step indicator */
        .steps {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .step {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }

        .step.active {
            background: linear-gradient(135deg, #0a4d68 0%, #088395 100%);
            color: white;
        }

        .step.completed {
            background: #27ae60;
            color: white;
        }

        .step-line {
            width: 50px;
            height: 3px;
            background: #e0e0e0;
            align-self: center;
        }

        .step-line.completed {
            background: #27ae60;
        }

        /* Form sections */
        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .otp-input {
            letter-spacing: 1rem;
            font-size: 1.5rem;
            text-align: center;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .resend-otp {
            text-align: center;
            margin-top: 1rem;
        }

        .resend-otp button {
            background: none;
            border: none;
            color: #088395;
            font-weight: 500;
            cursor: pointer;
        }

        .resend-otp button:disabled {
            color: #999;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🔐</div>
            <h1>Reset Password</h1>
            <p>Follow the steps to reset your password</p>
        </div>

        <!-- Step Indicator -->
        <div class="steps">
            <div class="step active" id="step1">1</div>
            <div class="step-line" id="line1"></div>
            <div class="step" id="step2">2</div>
            <div class="step-line" id="line2"></div>
            <div class="step" id="step3">3</div>
        </div>

        <div id="messageBox" class="message"></div>

        <!-- Step 1: Enter Email/Phone -->
        <div class="form-section active" id="section1">
            <form id="step1Form">
                <div class="form-group">
                    <label>Account Type</label>
                    <select id="accountType" required>
                        <option value="">Select account type</option>
                        <option value="patient">Patient</option>
                        <option value="staff">Staff</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Email or Phone Number</label>
                    <input type="text" id="emailPhone" placeholder="Enter your registered email or phone" required>
                </div>
                <button type="submit" class="btn">Send OTP</button>
            </form>
        </div>

        <!-- Step 2: Enter OTP -->
        <div class="form-section" id="section2">
            <form id="step2Form">
                <div class="form-group">
                    <label>Enter OTP</label>
                    <input type="text" id="otpInput" class="otp-input" maxlength="6" placeholder="000000" required>
                    <p style="color: #666; font-size: 0.85rem; margin-top: 0.5rem; text-align: center;">
                        OTP sent to <span id="sentTo"></span>
                    </p>
                </div>
                <button type="submit" class="btn">Verify OTP</button>
                <div class="resend-otp">
                    <button type="button" id="resendBtn" onclick="resendOTP()" disabled>Resend OTP (<span id="countdown">60</span>s)</button>
                </div>
            </form>
        </div>

        <!-- Step 3: New Password -->
        <div class="form-section" id="section3">
            <form id="step3Form">
                <div class="form-group">
                    <label>New Password</label>
                    <div class="password-container">
                        <input type="password" id="newPassword" placeholder="Enter new password" minlength="6" required>
                        <span class="toggle-password" onclick="togglePassword('newPassword')">👁️</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-container">
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" minlength="6" required>
                        <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
                    </div>
                </div>
                <button type="submit" class="btn">Reset Password</button>
            </form>
        </div>

        <div class="back-link">
            <a href="patient_login.html">← Back to Login</a>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let generatedOTP = '';
        let userEmail = '';
        let accountType = '';
        let countdownInterval = null;

        // Step 1: Send OTP
        document.getElementById('step1Form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            accountType = document.getElementById('accountType').value;
            userEmail = document.getElementById('emailPhone').value.trim();
            
            if (!accountType || !userEmail) {
                showMessage('Please fill all fields', 'error');
                return;
            }

            // Generate a random 6-digit OTP (in real system, this would be sent via SMS/Email)
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            // In a real system, you'd send this OTP via email/SMS
            // For demo, we'll show it in alert
            alert(`Demo Mode: Your OTP is ${generatedOTP}\n\nIn production, this would be sent to your email/phone.`);
            
            document.getElementById('sentTo').textContent = userEmail;
            goToStep(2);
            startCountdown();
        });

        // Step 2: Verify OTP
        document.getElementById('step2Form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const enteredOTP = document.getElementById('otpInput').value.trim();
            
            if (enteredOTP === generatedOTP) {
                goToStep(3);
            } else {
                showMessage('Invalid OTP. Please try again.', 'error');
            }
        });

        // Step 3: Reset Password
        document.getElementById('step3Form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }

            try {
                const response = await fetch('api/reset_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        account_type: accountType,
                        email_phone: userEmail,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('Password reset successfully! Redirecting to login...', 'success');
                    setTimeout(() => {
                        if (accountType === 'patient') {
                            window.location.href = 'patient_login.html';
                        } else {
                            window.location.href = 'staff_login.html';
                        }
                    }, 2000);
                } else {
                    showMessage(data.message || 'Failed to reset password', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            }
        });

        function goToStep(step) {
            currentStep = step;
            
            // Update step indicators
            for (let i = 1; i <= 3; i++) {
                const stepEl = document.getElementById(`step${i}`);
                const sectionEl = document.getElementById(`section${i}`);
                
                stepEl.classList.remove('active', 'completed');
                sectionEl.classList.remove('active');
                
                if (i < step) {
                    stepEl.classList.add('completed');
                } else if (i === step) {
                    stepEl.classList.add('active');
                    sectionEl.classList.add('active');
                }
            }

            // Update lines
            document.getElementById('line1').classList.toggle('completed', step > 1);
            document.getElementById('line2').classList.toggle('completed', step > 2);

            // Hide message
            document.getElementById('messageBox').style.display = 'none';
        }

        function showMessage(text, type) {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = text;
            msgBox.className = `message ${type}`;
            msgBox.style.display = 'block';
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling;
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }

        function startCountdown() {
            let seconds = 60;
            const btn = document.getElementById('resendBtn');
            const countdown = document.getElementById('countdown');
            
            btn.disabled = true;
            
            countdownInterval = setInterval(() => {
                seconds--;
                countdown.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(countdownInterval);
                    btn.disabled = false;
                    btn.innerHTML = 'Resend OTP';
                }
            }, 1000);
        }

        function resendOTP() {
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            alert(`Demo Mode: Your new OTP is ${generatedOTP}`);
            startCountdown();
            showMessage('New OTP sent!', 'success');
        }
    </script>
</body>
</html>
