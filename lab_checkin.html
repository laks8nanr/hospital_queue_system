<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Check-In - MediNova Hospital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a4d68 0%, #088395 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .checkin-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .card-header .icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .card-header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .card-header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .card-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1.2rem;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .form-group input:focus {
            outline: none;
            border-color: #9b59b6;
        }

        .form-hint {
            font-size: 0.85rem;
            color: #888;
            margin-top: 8px;
            text-align: center;
        }

        .error-message {
            background: #fee;
            color: #c0392b;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }

        .error-message.show { display: block; }

        .checkin-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .checkin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(155,89,182,0.4);
        }

        .checkin-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }

        /* Token Display */
        .token-display {
            display: none;
            text-align: center;
        }

        .token-display.show { display: block; }

        .token-success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .token-success .check-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .token-number {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin: 15px 0;
        }

        .token-details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .token-details .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .token-details .detail-row:last-child {
            border-bottom: none;
        }

        .token-details .label {
            color: #666;
        }

        .token-details .value {
            font-weight: 600;
            color: #2c3e50;
        }

        .queue-info {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .queue-box {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .queue-box.position {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .queue-box.wait {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }

        .queue-box .number {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .queue-box .text {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .location-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .location-box .icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .home-btn {
            width: 100%;
            padding: 14px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .home-btn:hover {
            background: #34495e;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .links a {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #9b59b6;
        }

        @media (max-width: 500px) {
            .card-header { padding: 30px 20px; }
            .card-body { padding: 20px; }
            .token-number { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkin-card">
            <div class="card-header">
                <div class="icon">🔬</div>
                <h1>Lab Test Check-In</h1>
                <p>Enter your booking code to get your token</p>
            </div>
            <div class="card-body">
                <!-- Check-in Form -->
                <div id="checkinForm">
                    <div class="form-group">
                        <label for="bookingCode">Booking Code</label>
                        <input type="text" id="bookingCode" placeholder="LB0001" maxlength="10" autocomplete="off">
                        <div class="form-hint">Enter the booking code you received when booking</div>
                    </div>
                    
                    <div class="error-message" id="errorMsg"></div>
                    
                    <button class="checkin-btn" id="checkinBtn" onclick="checkIn()">
                        🎫 Generate Token
                    </button>
                    
                    <div class="links">
                        <a href="lab_booking.html">Book New Test</a>
                        <a href="patient_dashboard.php">Back to Dashboard</a>
                    </div>
                </div>

                <!-- Token Display -->
                <div class="token-display" id="tokenDisplay">
                    <div class="token-success">
                        <div class="check-icon">✓</div>
                        <div>Check-In Successful!</div>
                        <div class="token-number" id="tokenNumber">MRI-001</div>
                    </div>

                    <div class="queue-info">
                        <div class="queue-box position">
                            <div class="number" id="queuePosition">1</div>
                            <div class="text">Queue Position</div>
                        </div>
                        <div class="queue-box wait">
                            <div class="number" id="waitTime">~15 min</div>
                            <div class="text">Est. Wait</div>
                        </div>
                    </div>

                    <div class="token-details">
                        <div class="detail-row">
                            <span class="label">Test</span>
                            <span class="value" id="testName">MRI Scan</span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Patient</span>
                            <span class="value" id="patientName">John Doe</span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Scheduled Time</span>
                            <span class="value" id="scheduledTime">10:00 AM</span>
                        </div>
                    </div>

                    <div class="location-box">
                        <div class="icon">📍</div>
                        <div id="location">Ground Floor, Lab Wing</div>
                    </div>

                    <button class="home-btn" onclick="goHome()">
                        🏠 Back to Dashboard
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Focus on input on load
        document.getElementById('bookingCode').focus();

        // Allow Enter key to submit
        document.getElementById('bookingCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkIn();
        });

        async function checkIn() {
            const bookingCode = document.getElementById('bookingCode').value.trim().toUpperCase();
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('checkinBtn');

            // Validate
            if (!bookingCode) {
                showError('Please enter your booking code');
                return;
            }

            if (!bookingCode.startsWith('LB')) {
                showError('Invalid booking code format. It should start with "LB"');
                return;
            }

            errorMsg.classList.remove('show');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            try {
                const response = await fetch('api/checkin_lab_booking.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ booking_code: bookingCode })
                });

                const data = await response.json();

                if (data.success) {
                    showToken(data.data);
                } else {
                    showError(data.message);
                    btn.disabled = false;
                    btn.textContent = '🎫 Generate Token';
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Check-in failed. Please try again.');
                btn.disabled = false;
                btn.textContent = '🎫 Generate Token';
            }
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }

        function showToken(data) {
            document.getElementById('tokenNumber').textContent = data.token_number;
            document.getElementById('queuePosition').textContent = data.queue_position;
            document.getElementById('waitTime').textContent = data.estimated_wait;
            document.getElementById('testName').textContent = data.test_name;
            document.getElementById('patientName').textContent = data.patient_name;
            document.getElementById('scheduledTime').textContent = data.scheduled_time;
            document.getElementById('location').textContent = data.location;

            document.getElementById('checkinForm').style.display = 'none';
            document.getElementById('tokenDisplay').classList.add('show');
        }

        function goHome() {
            window.location.href = 'patient_dashboard.php';
        }
    </script>
</body>
</html>
