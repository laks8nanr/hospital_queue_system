<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Login - HealthCare Hospital</title>

<style>
/* Your entire CSS remains unchanged */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem;
}

.login-container {
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 450px;
    padding: 2.5rem;
}

.login-header { text-align: center; margin-bottom: 2rem; }
.login-header h1 { color: #667eea; font-size: 2rem; margin-bottom: 0.5rem; }
.login-header p { color: #666; font-size: 1rem; }

.icon { font-size: 4rem; margin-bottom: 1rem; }

.form-group { margin-bottom: 1.5rem; }
.form-group label { display: block; color: #333; font-weight: 600; margin-bottom: 0.5rem; }

.form-group input {
    width: 100%;
    padding: 0.9rem;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 1rem;
}

.form-group input:focus {
    outline: none;
    border-color: #667eea;
}

.password-container { position: relative; }

.toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 1.2rem;
    color: #666;
}

.login-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
}

.error-message {
    background: #ffe6e6;
    color: #d63031;
    padding: 0.8rem;
    border-radius: 8px;
    margin-bottom: 1rem;
    display: none;
}

.register-link, .back-home {
    text-align: center;
    margin-top: 1.5rem;
}

.register-link a, .back-home a {
    color: #667eea;
    text-decoration: none;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="login-container">

<div class="login-header">
    <div class="icon">👤</div>
    <h1>Patient Login</h1>
    <p>Access your medical records and appointments</p>
</div>

<div id="errorMessage" class="error-message"></div>

<!-- UPDATED FORM -->
<form id="loginForm" action="login.php" method="POST">

    <div class="form-group">
        <label>Patient ID / Email</label>
        <input type="text" 
               name="login_input"
               id="patientId"
               placeholder="Enter your Patient ID or Email"
               required>
    </div>

    <div class="form-group">
        <label>Password</label>
        <div class="password-container">
            <input type="password" 
                   name="password"
                   id="password"
                   placeholder="Enter your password"
                   required>
            <span class="toggle-password" onclick="togglePassword()">👁️</span>
        </div>
    </div>

    <button type="submit" name="login" class="login-btn">Login</button>

</form>

<div class="register-link">
    New patient? <a href="register.html">Create an account</a>
</div>

<div class="back-home">
    <a href="home.html">← Back to Home</a>
</div>

</div>

<script>

// Toggle password
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.querySelector('.toggle-password');

    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.textContent = '🙈';
    } else {
        passwordInput.type = 'password';
        toggleIcon.textContent = '👁️';
    }
}

// Show error/success from PHP
const params = new URLSearchParams(window.location.search);
if (params.get("error")) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.textContent = params.get("error");
    errorDiv.style.display = 'block';
}
if (params.get("success")) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.textContent = params.get("success");
    errorDiv.style.background = '#d4edda';
    errorDiv.style.color = '#155724';
    errorDiv.style.display = 'block';
}

// Handle form submission with AJAX for pharmacy redirect support
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const errorDiv = document.getElementById('errorMessage');
    const loginBtn = document.querySelector('.login-btn');
    const loginInput = document.getElementById('patientId').value.trim();
    const password = document.getElementById('password').value;

    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';
    errorDiv.style.display = 'none';

    try {
        const response = await fetch('api/patient_login.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login_input: loginInput, password: password })
        });

        const data = await response.json();

        if (data.success) {
            // Store patient data in session storage
            sessionStorage.setItem('patientData', JSON.stringify(data.data));

            // Check if there's a redirect after login
            const redirect = sessionStorage.getItem('afterLoginRedirect');
            if (redirect) {
                sessionStorage.removeItem('afterLoginRedirect');
                window.location.href = redirect;
            } else {
                window.location.href = 'patient_dashboard.php';
            }
        } else {
            errorDiv.textContent = data.message || 'Login failed';
            errorDiv.style.display = 'block';
            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';
        }
    } catch (error) {
        console.error('Login error:', error);
        errorDiv.textContent = 'Network error. Please try again.';
        errorDiv.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
    }
});

</script>

</body>
</html>
