<!-- Doctors list for selected department -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediNova Hospital - Select Doctor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { 
      font-family: 'Poppins', sans-serif !important; 
      background: linear-gradient(180deg, #f8fafb 0%, #e8eef3 100%);
      min-height: 100vh;
      padding-bottom: 40px;
    }
    .header { display: flex; justify-content: center; padding: 25px 0 20px; }
    .logo-container { display: flex; align-items: center; gap: 15px; }
    .logo-symbol {
      width: 55px; height: 55px;
      background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(8,131,149,0.2);
    }
    .logo-text { color: #0a4d68; }
    .logo-title { font-size: 1.6rem; font-weight: 700; }
    .logo-subtitle { font-size: 0.8rem; opacity: 0.7; letter-spacing: 2px; text-transform: uppercase; }
    
    h2 { 
      color: #0a4d68; 
      font-weight: 600; 
      font-size: 1.6rem;
      margin-bottom: 8px;
    }
    .dept-subtitle { 
      color: #088395; 
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 20px;
    }
    
    .view-mode { display: block; }
    .form-mode { display: none; }
    .token-mode { display: none; }
    
    .doctor-card-expanded {
      background: linear-gradient(135deg, #fff 0%, #f8fafb 100%);
      border: 2px solid #e8eef3;
      border-radius: 20px;
      padding: 24px;
      margin: 15px 0;
      box-shadow: 0 6px 25px rgba(8, 131, 149, 0.1);
      transition: all 0.3s;
    }
    
    .doctor-card-expanded:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 35px rgba(8, 131, 149, 0.18);
      border-color: #088395;
    }
    
    .doctor-header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }
    
    .doctor-avatar {
      width: 65px;
      height: 65px;
      background: linear-gradient(135deg, #088395, #0a4d68);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 6px 20px rgba(8, 131, 149, 0.3);
    }
    
    .doctor-main-info h3 {
      margin: 0;
      color: #0a4d68;
      font-size: 20px;
      font-weight: 600;
    }
    
    .doctor-qualification {
      color: #088395;
      font-size: 14px;
      margin-top: 4px;
      font-weight: 500;
    }
    
    .doctor-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 15px;
    }
    
    .stat-box {
      background: linear-gradient(135deg, #f8fafb, #e8eef3);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
      border: 1px solid #e8eef3;
    }
    
    .stat-icon {
      font-size: 22px;
      display: block;
      margin-bottom: 6px;
    }
    
    .stat-value {
      font-size: 15px;
      font-weight: 700;
      color: #0a4d68;
      display: block;
    }
    
    .stat-label {
      font-size: 11px;
      color: #088395;
      display: block;
      font-weight: 500;
    }
    
    .wait-time-low { color: #27ae60; }
    .wait-time-medium { color: #f39c12; }
    .wait-time-high { color: #e74c3c; }
    
    .select-doctor-btn {
      width: 100%;
      padding: 14px;
      margin-top: 18px;
      background: linear-gradient(135deg, #088395, #0a4d68);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.3px;
    }
    
    .select-doctor-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(8, 131, 149, 0.35);
    }
    
    /* Patient Form Styles */
    .patient-form-container {
      max-width: 450px;
      margin: 20px auto;
      background: #fff;
      border-radius: 24px;
      padding: 35px;
      box-shadow: 0 10px 40px rgba(8, 131, 149, 0.12);
      border-top: 5px solid #088395;
    }
    
    .selected-doctor-info {
      background: linear-gradient(135deg, #e0f7fa, #b2ebf2);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 25px;
      text-align: center;
      border: 2px solid #05bfdb;
    }
    
    .selected-doctor-info h4 {
      margin: 0 0 5px 0;
      color: #0a4d68;
      font-weight: 600;
    }
    
    .selected-doctor-info p {
      margin: 0;
      color: #088395;
      font-size: 14px;
    }
    
    .pay-fees-btn {
      width: 100%;
      padding: 16px;
      margin-top: 18px;
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    
    .pay-fees-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(243, 156, 18, 0.35);
    }
    
    .pay-fees-btn.paid {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      cursor: default;
    }
    
    .generate-token-btn {
      width: 100%;
      padding: 16px;
      margin-top: 12px;
      background: #d0d8e0;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: not-allowed;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    
    .generate-token-btn.active {
      background: linear-gradient(135deg, #088395, #0a4d68);
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(8, 131, 149, 0.3);
    }
    
    .generate-token-btn.active:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(8, 131, 149, 0.4);
    }
    
    .back-btn {
      background: none;
      border: none;
      color: #088395;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 15px;
    }
    
    .back-btn:hover {
      text-decoration: underline;
    }
    
    /* Token Display Styles */
    .token-display-container {
      max-width: 500px;
      margin: 20px auto;
      padding: 0 15px;
    }
    
    .your-token-card {
      background: linear-gradient(145deg, #1a3a4d 0%, #0a4d68 50%, #088395 100%);
      border-radius: 24px;
      padding: 30px;
      color: white;
      box-shadow: 0 15px 40px rgba(10, 77, 104, 0.4);
      margin-bottom: 25px;
      border: 2px solid rgba(255,255,255,0.1);
    }
    
    .token-header {
      text-align: center;
      margin-bottom: 25px;
    }
    
    .your-token-number {
      font-size: 80px;
      font-weight: 700;
      background: linear-gradient(135deg, #05bfdb, #00d4aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 8px rgba(5,191,219,0.3));
      line-height: 1;
      letter-spacing: 2px;
    }
    
    .token-type-badge {
      display: inline-block;
      background: linear-gradient(135deg, #05bfdb, #088395);
      padding: 8px 20px;
      border-radius: 25px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 15px;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(5,191,219,0.3);
    }
    
    .token-stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 25px;
    }
    
    .token-stat-item {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 18px 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
    }
    
    .token-stat-item:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-2px);
    }
    
    .token-stat-item .icon {
      font-size: 26px;
      margin-bottom: 8px;
      display: block;
    }
    
    .token-stat-item .value {
      font-size: 20px;
      font-weight: 700;
      color: #05bfdb;
      display: block;
    }
    
    .token-stat-item .label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }
    
    /* Queue Visualization */
    .queue-section {
      background: #fff;
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      border: 1px solid #e8eef3;
    }
    
    .queue-title {
      font-size: 16px;
      font-weight: 600;
      color: #0a4d68;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 15px;
      border-bottom: 2px solid #e8eef3;
    }
    
    .queue-track {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .queue-item {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      border-radius: 14px;
      background: #f8fafb;
      border-left: 5px solid #d0d8e0;
      transition: all 0.3s;
    }
    
    .queue-item.current {
      background: linear-gradient(135deg, #d4edda, #c3e6cb);
      border-left-color: #27ae60;
      animation: pulse 2s infinite;
    }
    
    .queue-item.prebooked {
      border-left-color: #9b59b6;
      background: linear-gradient(135deg, #f8f0fc, #f3e5f5);
    }
    
    .queue-item.walkin {
      border-left-color: #088395;
      background: linear-gradient(135deg, #e0f7fa, #b2ebf2);
    }
    
    .queue-item.review {
      border-left-color: #e67e22;
      background: linear-gradient(135deg, #fff8f0, #ffe8d5);
    }
    
    .queue-item.you {
      border-left-color: #05bfdb;
      background: linear-gradient(135deg, #e0f7fa, #b2ebf2);
      box-shadow: 0 6px 20px rgba(5, 191, 219, 0.25);
      border: 2px solid #05bfdb;
      border-left-width: 5px;
    }
    
    .queue-item.you-highlight {
      border: 3px solid #05bfdb;
      animation: youPulse 1.5s infinite;
    }
    
    @keyframes youPulse {
      0%, 100% { box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
      50% { box-shadow: 0 4px 25px rgba(46, 204, 113, 0.6); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    .queue-position {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      margin-right: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
    
    .queue-item.current .queue-position { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
    .queue-item.prebooked .queue-position { background: linear-gradient(135deg, #9b59b6, #a855f7); color: white; }
    .queue-item.walkin .queue-position { background: linear-gradient(135deg, #088395, #05bfdb); color: white; }
    .queue-item.review .queue-position { background: linear-gradient(135deg, #e67e22, #f39c12); color: white; }
    .queue-item.you .queue-position { background: linear-gradient(135deg, #05bfdb, #00d4aa); color: white; box-shadow: 0 4px 15px rgba(5,191,219,0.4); }
    
    .queue-item.not-arrived {
      opacity: 0.6;
      border-style: dashed;
    }
    
    .queue-info {
      flex: 1;
    }
    
    .queue-name {
      font-weight: bold;
      color: #2c3e50;
      font-size: 14px;
    }
    
    .queue-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      margin-left: 10px;
      letter-spacing: 0.5px;
    }
    
    .badge-prebooked { background: linear-gradient(135deg, #9b59b6, #a855f7); color: white; }
    .badge-walkin { background: linear-gradient(135deg, #088395, #05bfdb); color: white; }
    .badge-review { background: linear-gradient(135deg, #e67e22, #f39c12); color: white; }
    .badge-you { background: linear-gradient(135deg, #05bfdb, #00d4aa); color: white; }
    .badge-current { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
    
    .queue-status {
      font-size: 12px;
      color: #7f8c8d;
    }
    
    /* Legend */
    .queue-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 2px solid #e8eef3;
      justify-content: center;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #0a4d68;
      font-weight: 500;
    }
    
    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 6px;
    }
    
    .legend-dot.prebooked { background: linear-gradient(135deg, #9b59b6, #a855f7); }
    .legend-dot.walkin { background: linear-gradient(135deg, #088395, #05bfdb); }
    .legend-dot.review { background: linear-gradient(135deg, #e67e22, #f39c12); }
    .legend-dot.current { background: linear-gradient(135deg, #27ae60, #2ecc71); }
    
    .cancel-token-btn {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    
    .cancel-token-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(231, 76, 60, 0.35);
    }
    
    .home-btn {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      background: linear-gradient(135deg, #088395, #0a4d68);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    
    .home-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(8,131,149,0.35);
    }
    
    /* ========== MOBILE RESPONSIVE ========== */
    @media screen and (max-width: 768px) {
      .doctor-card-expanded {
        padding: 15px;
        margin: 10px 5px;
      }
      
      .doctor-avatar {
        width: 50px;
        height: 50px;
        font-size: 24px;
      }
      
      .doctor-main-info h3 {
        font-size: 18px;
      }
      
      .doctor-qualification {
        font-size: 12px;
      }
      
      .doctor-stats {
        gap: 8px;
      }
      
      .stat-box {
        padding: 10px 5px;
      }
      
      .stat-value {
        font-size: 14px;
      }
      
      .stat-label {
        font-size: 10px;
      }
      
      .your-token-number {
        font-size: 50px;
      }
      
      .token-stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      
      .token-stat-item .value {
        font-size: 18px;
      }
      
      .patient-form-container {
        margin: 10px;
        padding: 20px;
      }
    }
    
    @media screen and (max-width: 480px) {
      .doctor-card-expanded {
        padding: 12px;
        margin: 8px 0;
      }
      
      .doctor-header {
        gap: 10px;
      }
      
      .doctor-avatar {
        width: 45px;
        height: 45px;
        font-size: 22px;
      }
      
      .doctor-main-info h3 {
        font-size: 16px;
      }
      
      .doctor-qualification {
        font-size: 11px;
      }
      
      .doctor-stats {
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
      }
      
      .stat-box {
        padding: 8px 4px;
      }
      
      .stat-icon {
        font-size: 16px;
      }
      
      .stat-value {
        font-size: 12px;
      }
      
      .stat-label {
        font-size: 9px;
      }
      
      .select-doctor-btn {
        padding: 10px;
        font-size: 14px;
      }
      
      .your-token-card {
        padding: 20px;
      }
      
      .your-token-number {
        font-size: 40px;
      }
      
      .token-type-badge {
        font-size: 10px;
        padding: 4px 10px;
      }
      
      .token-stat-item {
        padding: 10px;
      }
      
      .token-stat-item .icon {
        font-size: 20px;
      }
      
      .token-stat-item .value {
        font-size: 16px;
      }
      
      .token-stat-item .label {
        font-size: 10px;
      }
      
      .queue-section {
        padding: 15px;
      }
      
      .queue-item {
        padding: 10px;
      }
      
      .queue-position {
        width: 35px;
        height: 35px;
        font-size: 14px;
      }
      
      .queue-name {
        font-size: 13px;
      }
      
      .queue-badge {
        font-size: 8px;
        padding: 2px 6px;
      }
      
      .queue-status {
        font-size: 11px;
      }
      
      .patient-form-container {
        margin: 5px;
        padding: 15px;
      }
      
      .pay-fees-btn, .generate-token-btn {
        padding: 12px;
        font-size: 16px;
      }
      
      .cancel-token-btn {
        padding: 12px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body class="center">

<div class="header">
  <div class="logo-container">
    <div class="logo-symbol">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 3H15V9H21V15H15V21H9V15H3V9H9V3Z" fill="#0a4d68" stroke="#088395" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="logo-text">
      <div class="logo-title">MediNova Hospital</div>
      <div class="logo-subtitle">Smart Healthcare</div>
    </div>
  </div>
</div>

<!-- VIEW MODE: Doctor List -->
<div id="viewMode" class="view-mode">
  <h2>Select Doctor</h2>
  <p id="dept-name" class="dept-subtitle"></p>
  <div class="doctors-list" id="doctors-container">
    <!-- Doctors will be loaded here by JavaScript -->
  </div>
</div>

<!-- FORM MODE: Patient Details Form -->
<div id="formMode" class="form-mode">
  <button class="back-btn" onclick="goBackToList()">← Back to Doctors</button>
  <h2>Book Appointment</h2>
  
  <div class="patient-form-container">
    <div class="selected-doctor-info" id="selectedDoctorDisplay">
      <!-- Selected doctor info will be shown here -->
    </div>
    
    <form id="patientForm">
      <div class="form-group">
        <label for="patientName">Patient Name *</label>
        <input type="text" id="patientName" placeholder="Enter Full Name" required>
      </div>
      
      <div class="form-group">
        <label for="patientAge">Age *</label>
        <input type="number" id="patientAge" placeholder="Enter Age" min="1" max="120" required>
      </div>
      
      <div class="form-group">
        <label for="patientPhone">Phone Number *</label>
        <input type="tel" id="patientPhone" placeholder="Enter Phone Number" pattern="[0-9]{10}" maxlength="10" required>
        <small class="form-hint">Enter 10 digit mobile number</small>
        <div id="activeTokenWarning" style="display:none; background:#fff3cd; border:1px solid #ffc107; color:#856404; padding:12px; border-radius:8px; margin-top:10px; font-size:0.9rem;">
          <strong>⚠️ Active Token Found</strong>
          <p id="activeTokenMessage" style="margin:5px 0 0 0;"></p>
          <a href="token_status.html" style="color:#856404; text-decoration:underline;">Check Token Status</a>
        </div>
      </div>
      
      <div class="error-message" id="errorMsg"></div>
      
      <button type="button" class="pay-fees-btn" id="payFeesBtn" onclick="payFees()">
        💳 Pay Consultation Fees: ₹<span id="feesAmount">300</span>
      </button>
      
      <button type="button" class="generate-token-btn" id="generateTokenBtn" onclick="generateToken()" disabled>
        🎫 Generate Token
      </button>
    </form>
  </div>
</div>

<!-- TOKEN MODE: Token Display with Queue -->
<div id="tokenMode" class="token-mode">
  <div class="token-display-container">
    
    <!-- Your Token Card -->
    <div class="your-token-card">
      <div class="token-header">
        <div class="your-token-number" id="displayTokenNumber">W-007</div>
        <div class="token-type-badge">🚶 Walk-in Patient</div>
      </div>
      
      <div class="token-stats-grid">
        <div class="token-stat-item">
          <div class="icon">⏰</div>
          <div class="value" id="displayExpectedTime">11:45 AM</div>
          <div class="label">Expected Time</div>
        </div>
        <div class="token-stat-item">
          <div class="icon">⏳</div>
          <div class="value" id="displayWaitTime">~25 mins</div>
          <div class="label">Wait Time</div>
        </div>
        <div class="token-stat-item">
          <div class="icon">👥</div>
          <div class="value" id="displayPeopleAhead">4</div>
          <div class="label">People Ahead</div>
        </div>
        <div class="token-stat-item">
          <div class="icon">👨‍⚕️</div>
          <div class="value" id="displayDoctorName">Dr. Smith</div>
          <div class="label">Doctor</div>
        </div>
      </div>
    </div>
    
    <!-- Queue Visualization -->
    <div class="queue-section">
      <div class="queue-title">
        <span>📋</span>
        <span>Live Queue</span>
      </div>
      
      <div class="queue-track" id="queueTrack">
        <!-- Queue items will be generated here -->
      </div>
      
      <div class="queue-legend">
        <div class="legend-item">
          <div class="legend-dot current"></div>
          <span>Consulting</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot prebooked"></div>
          <span>Pre-booked</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot walkin"></div>
          <span>Walk-in</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot review"></div>
          <span>Review</span>
        </div>
      </div>
    </div>
    
    <button class="cancel-token-btn" onclick="cancelToken()">
      ❌ Cancel Token
    </button>
    
    <button class="home-btn" onclick="goHome()">
      🏠 Back to Home
    </button>
  </div>
</div>

<script>
  // Get department from URL
  var urlParams = new URLSearchParams(window.location.search);
  var department = urlParams.get('dept') || 'General Medicine';
  
  document.getElementById('dept-name').textContent = department;

  var container = document.getElementById('doctors-container');
  
  // Store selected doctor info
  var selectedDoctorData = null;
  var feesPaid = false;
  var currentToken = null;
  var currentPatientName = null;
  var refreshInterval = null;
  var hasActiveToken = false;
  var phoneListenerAdded = false;

  function setupPhoneListener() {
    if (phoneListenerAdded) return;
    var phoneInput = document.getElementById('patientPhone');
    if (phoneInput) {
      phoneListenerAdded = true;
      phoneInput.addEventListener('input', function(e) {
        this.value = this.value.replace(/\D/g, '').slice(0, 10);
        
        // Check for active token when phone is complete (10 digits)
        if (this.value.length === 10) {
          checkActiveTokenForPhone(this.value);
        } else {
          // Hide warning if phone is incomplete
          var warningDiv = document.getElementById('activeTokenWarning');
          if (warningDiv) warningDiv.style.display = 'none';
          hasActiveToken = false;
        }
      });
    }
  }

  function checkActiveTokenForPhone(phone) {
    fetch('api/check_active_token.php?phone=' + encodeURIComponent(phone))
      .then(response => response.json())
      .then(data => {
        var warningDiv = document.getElementById('activeTokenWarning');
        var messageEl = document.getElementById('activeTokenMessage');
        var payBtn = document.getElementById('payFeesBtn');
        
        if (data.has_active_token) {
          hasActiveToken = true;
          if (messageEl) messageEl.innerHTML = data.message;
          if (warningDiv) warningDiv.style.display = 'block';
          
          // Disable pay button
          if (payBtn) {
            payBtn.disabled = true;
            payBtn.innerHTML = '⚠️ Cannot Proceed - Active Token Exists';
            payBtn.style.background = '#ccc';
          }
        } else {
          hasActiveToken = false;
          if (warningDiv) warningDiv.style.display = 'none';
        }
      })
      .catch(function(error) {
        console.error('Error checking active token:', error);
        hasActiveToken = false;
      });
  }

  // Show loading message
  container.innerHTML = '<p>Loading doctors...</p>';

  // Fetch doctors from PHP API
  fetch('api/get_doctors.php?department=' + encodeURIComponent(department))
    .then(function(response) {
      if (!response.ok) {
        throw new Error('Network response was not ok');
      }
      return response.json();
    })
    .then(function(data) {
      console.log('API Response:', data);
      if (data.success && data.data && data.data.length > 0) {
        container.innerHTML = '';
        for (var i = 0; i < data.data.length; i++) {
          var doctor = data.data[i];
          // Use data from API, with fallbacks
          var qualification = doctor.qualification || 'MBBS';
          var fees = doctor.fees || 300;
          var waitTime = doctor.wait_time || 0;
          
          // Wait time display removed - not showing prebooked queue info to walk-in patients
          
          // Build location string
          var locationParts = [doctor.floor_block, doctor.wing, doctor.room_number].filter(function(p) { return p; });
          var locationStr = locationParts.length > 0 ? locationParts.join(' → ') : '-';
          
          var doctorCard = document.createElement('div');
          doctorCard.className = 'doctor-card-expanded';
          doctorCard.innerHTML = 
            '<div class="doctor-header">' +
              '<div class="doctor-avatar">👨‍⚕️</div>' +
              '<div class="doctor-main-info">' +
                '<h3>' + doctor.name + '</h3>' +
                '<div class="doctor-qualification">' + qualification + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="doctor-stats">' +
              '<div class="stat-box">' +
                '<span class="stat-icon">💰</span>' +
                '<span class="stat-value">₹' + fees + '</span>' +
                '<span class="stat-label">Consultation Fee</span>' +
              '</div>' +
              '<div class="stat-box">' +
                '<span class="stat-icon">⏱️</span>' +
                '<span class="stat-value wait-time-low">No wait</span>' +
                '<span class="stat-label">Est. Wait Time</span>' +
              '</div>' +
              '<div class="stat-box">' +
                '<span class="stat-icon">🕐</span>' +
                '<span class="stat-value">' + doctor.time_slot + '</span>' +
                '<span class="stat-label">Available</span>' +
              '</div>' +
            '</div>' +
            '<div style="background:#e3f2fd; border-radius:8px; padding:10px; margin-top:10px; text-align:center; font-size:14px;">' +
              '<span style="color:#1976d2;">📍 Location: ' + locationStr + '</span>' +
            '</div>' +
            '<button class="select-doctor-btn" data-id="' + doctor.id + '" data-name="' + doctor.name + '" data-time="' + doctor.time_slot + '" data-fees="' + fees + '" data-wait="' + waitTime + '" data-qual="' + qualification + '" data-location="' + locationStr + '">' +
              'Select Doctor' +
            '</button>';
          
          // Add click event to button
          doctorCard.querySelector('.select-doctor-btn').addEventListener('click', function() {
            selectDoctor(
              parseInt(this.dataset.id),
              this.dataset.name,
              this.dataset.time,
              department,
              parseInt(this.dataset.fees),
              parseInt(this.dataset.wait),
              this.dataset.qual,
              this.dataset.location
            );
          });
          
          container.appendChild(doctorCard);
        }
      } else {
        container.innerHTML = '<p>No doctors available for this department.</p>';
      }
    })
    .catch(function(error) {
      console.error('Error:', error);
      container.innerHTML = '<p>Failed to load doctors. Please try again. Error: ' + error.message + '</p>';
    });

  function selectDoctor(id, name, time, dept, fees, waitTime, qualification, location) {
    selectedDoctorData = { id: id, name: name, time: time, dept: dept, fees: fees, waitTime: waitTime, qualification: qualification, location: location };
    
    // Update the selected doctor display
    document.getElementById('selectedDoctorDisplay').innerHTML = 
      '<h4>👨‍⚕️ ' + name + '</h4>' +
      '<p>' + qualification + '</p>' +
      '<p><strong>' + dept + '</strong> | 🕐 ' + time + '</p>' +
      '<p style="color: #1976d2;">📍 ' + location + '</p>';
    
    document.getElementById('feesAmount').textContent = fees;
    
    // Switch to form mode
    document.getElementById('viewMode').style.display = 'none';
    document.getElementById('formMode').style.display = 'block';
    
    // Reset form state
    feesPaid = false;
    hasActiveToken = false;
    document.getElementById('payFeesBtn').classList.remove('paid');
    document.getElementById('payFeesBtn').disabled = false;
    document.getElementById('payFeesBtn').innerHTML = '💳 Pay Consultation Fees: ₹' + fees;
    document.getElementById('payFeesBtn').style.background = '';
    document.getElementById('generateTokenBtn').disabled = true;
    document.getElementById('generateTokenBtn').classList.remove('active');
    document.getElementById('activeTokenWarning').style.display = 'none';
    
    // Clear form
    document.getElementById('patientName').value = '';
    document.getElementById('patientAge').value = '';
    document.getElementById('patientPhone').value = '';
    document.getElementById('errorMsg').textContent = '';
    
    // Setup phone listener
    setupPhoneListener();
  }

  function goBackToList() {
    document.getElementById('viewMode').style.display = 'block';
    document.getElementById('formMode').style.display = 'none';
    selectedDoctorData = null;
    feesPaid = false;
    hasActiveToken = false;
  }

  function payFees() {
    // Block if active token exists
    if (hasActiveToken) {
      alert('You already have an active token. Please complete or cancel it before booking a new appointment.');
      return;
    }
    
    const name = document.getElementById('patientName').value.trim();
    const age = document.getElementById('patientAge').value;
    const phone = document.getElementById('patientPhone').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    
    // Validation
    if (!name || !age || !phone) {
      errorMsg.textContent = 'Please fill all fields before paying';
      return;
    }
    
    if (phone.length !== 10 || !/^\d+$/.test(phone)) {
      errorMsg.textContent = 'Please enter valid 10 digit phone number';
      return;
    }
    
    errorMsg.textContent = '';
    
    // Simulate payment
    const payBtn = document.getElementById('payFeesBtn');
    payBtn.innerHTML = '⏳ Processing...';
    payBtn.disabled = true;
    
    setTimeout(() => {
      feesPaid = true;
      payBtn.innerHTML = '✅ Payment Successful';
      payBtn.classList.add('paid');
      
      // Enable generate token button
      document.getElementById('generateTokenBtn').disabled = false;
      document.getElementById('generateTokenBtn').classList.add('active');
    }, 1500);
  }

  function generateToken() {
    if (!feesPaid) return;
    
    const name = document.getElementById('patientName').value.trim();
    const age = document.getElementById('patientAge').value;
    const phone = document.getElementById('patientPhone').value.trim();
    
    const generateBtn = document.getElementById('generateTokenBtn');
    generateBtn.innerHTML = '⏳ Generating...';
    generateBtn.disabled = true;

    // Call PHP API to generate token
    fetch('api/generate_token.php', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        doctor_id: selectedDoctorData.id,
        department: selectedDoctorData.dept,
        patient_name: name,
        patient_age: age,
        patient_phone: phone,
        type: 'walkin'
      })
    })
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        // Store token info (both sessionStorage and localStorage for persistence)
        sessionStorage.setItem('currentToken', data.data.token_number);
        sessionStorage.setItem('tokenId', data.data.id || '');
        localStorage.setItem('activeServiceToken', data.data.token_number);
        
        // Display token result
        showTokenDisplay(data.data, name);
      } else {
        alert('Failed to generate token: ' + data.message);
        generateBtn.disabled = false;
        generateBtn.innerHTML = '🎫 Generate Token';
      }
    })
    .catch(error => {
      console.error('Error:', error);
      // For demo, show simulated token
      const simulatedData = {
        token_number: 'W-' + String(Math.floor(Math.random() * 100) + 1).padStart(3, '0'),
        expected_time: calculateExpectedTime(selectedDoctorData.waitTime),
        patients_ahead: 4
      };
      showTokenDisplay(simulatedData, name);
    });
  }

  function calculateExpectedTime(waitMins) {
    const now = new Date();
    now.setMinutes(now.getMinutes() + waitMins);
    return now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  }

  function showTokenDisplay(tokenData, patientName) {
    // Update token display
    document.getElementById('displayTokenNumber').textContent = tokenData.token_number;
    document.getElementById('displayExpectedTime').textContent = tokenData.expected_time;
    document.getElementById('displayWaitTime').textContent = '~' + selectedDoctorData.waitTime + ' mins';
    document.getElementById('displayPeopleAhead').textContent = tokenData.patients_ahead;
    document.getElementById('displayDoctorName').textContent = selectedDoctorData.name;
    
    // Generate queue visualization
    generateQueueVisualization(tokenData.token_number, patientName);
    
    // Switch to token mode
    document.getElementById('formMode').style.display = 'none';
    document.getElementById('tokenMode').style.display = 'block';
  }

  function generateQueueVisualization(yourToken, yourName) {
    // Store for auto-refresh
    currentToken = yourToken;
    currentPatientName = yourName;
    
    // Initial load
    refreshQueue();
    
    // Start auto-refresh every 5 seconds
    startAutoRefresh();
  }
  
  function refreshQueue() {
    if (!currentToken) return;
    
    var queueTrack = document.getElementById('queueTrack');
    var doctorId = selectedDoctorData ? selectedDoctorData.id : 0;
    
    fetch('api/get_live_queue.php?doctor_id=' + doctorId + '&current_token=' + encodeURIComponent(currentToken))
      .then(function(response) { return response.json(); })
      .then(function(data) {
        if (data.success && data.queue.length > 0) {
          // Update people ahead count
          document.getElementById('displayPeopleAhead').textContent = data.people_ahead;
          document.getElementById('displayWaitTime').textContent = '~' + (data.people_ahead * 10) + ' mins';
          
          // Render queue
          renderQueue(data.queue);
        } else {
          // No queue, just show user as first
          document.getElementById('displayPeopleAhead').textContent = '0';
          document.getElementById('displayWaitTime').textContent = '~0 mins';
          var queueData = [{ position: 1, patient_name: currentPatientName, token_type: 'you', status: 'waiting', token_number: currentToken, is_you: true }];
          renderQueue(queueData);
        }
      })
      .catch(function(error) {
        console.error('Queue fetch error:', error);
      });
  }
  
  function startAutoRefresh() {
    // Clear any existing interval
    if (refreshInterval) {
      clearInterval(refreshInterval);
    }
    // Refresh every 5 seconds
    refreshInterval = setInterval(refreshQueue, 5000);
  }
  
  function stopAutoRefresh() {
    if (refreshInterval) {
      clearInterval(refreshInterval);
      refreshInterval = null;
    }
  }
  
  function renderQueue(queueData) {
    var queueTrack = document.getElementById('queueTrack');
    var html = '';
    
    for (var i = 0; i < queueData.length; i++) {
      var item = queueData[i];
      var isYou = item.is_you || (currentToken && item.token_number === currentToken);
      var type = isYou ? 'you' : (item.status === 'consulting' ? 'current' : item.token_type);
      var badge = '';
      var extraClass = '';
      
      // Only show token number, hide names for privacy
      if (isYou) {
        badge = 'YOU';
        extraClass = ' you-highlight';
      } else if (item.status === 'consulting') {
        badge = 'Consulting';
      } else if (item.token_type === 'prebooked' || (item.token_number && item.token_number.startsWith('PB'))) {
        badge = 'Prebooked';
        if (item.checkin_status === 'not_checked_in') {
          extraClass = ' not-arrived';
        }
      } else if (item.token_type === 'review') {
        badge = 'Review';
      } else {
        badge = 'Walk-in';
      }
      
      html += '<div class="queue-item ' + type + extraClass + '">' +
        '<div class="queue-position">' + item.position + '</div>' +
        '<div class="queue-info">' +
          '<div class="queue-name">' + item.token_number +
            ' <span class="queue-badge badge-' + type + '">' + badge + '</span>' +
          '</div>' +
          (isYou ? '<div class="queue-status">Your token</div>' : '') +
        '</div>' +
      '</div>';
    }
    queueTrack.innerHTML = html;
  }

  function cancelToken() {
    if (confirm('Are you sure you want to cancel your token?')) {
      stopAutoRefresh();
      var tokenNumber = sessionStorage.getItem('currentToken');
      var tokenId = sessionStorage.getItem('tokenId');
      
      // Call API to cancel token
      fetch('api/cancel_token.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          token: tokenNumber,
          token_id: tokenId
        })
      })
      .then(function(response) { return response.json(); })
      .then(function(data) {
        if (data.success) {
          alert('Your token has been cancelled successfully.');
        } else {
          alert('Token cancelled (locally). ' + (data.message || ''));
        }
        // Clear session and go home
        sessionStorage.removeItem('currentToken');
        sessionStorage.removeItem('tokenId');
        window.location.href = 'index.html';
      })
      .catch(function(error) {
        console.error('Error:', error);
        alert('Your token has been cancelled.');
        sessionStorage.removeItem('currentToken');
        sessionStorage.removeItem('tokenId');
        window.location.href = 'index.html';
      });
    }
  }

  function goHome() {
    stopAutoRefresh();
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
