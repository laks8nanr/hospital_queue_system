<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediNova Hospital - Pharmacy Staff Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Pharmacy Staff Dashboard Styles */
    body.pharmacy-dashboard {
      background: #f0f8ff;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    .dashboard-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header */
    .dashboard-header {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-logo {
      font-size: 20px;
      font-weight: 700;
    }

    .pharmacy-badge {
      background: rgba(255,255,255,0.2);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .staff-info {
      text-align: right;
      font-size: 12px;
    }

    .staff-name {
      font-weight: 600;
    }

    .logout-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    /* Main Content */
    .dashboard-main {
      flex: 1;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    /* Location Card */
    .location-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .location-title {
      font-size: 18px;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .location-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .location-item {
      text-align: center;
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
    }

    .location-label {
      font-size: 11px;
      color: #7f8c8d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .location-value {
      font-size: 24px;
      font-weight: 700;
      color: #27ae60;
    }

    /* Current Token Card */
    .current-token-card {
      background: linear-gradient(135deg, #3498db, #2980b9);
      border-radius: 16px;
      padding: 30px;
      color: white;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(52, 152, 219, 0.3);
    }

    .current-label {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .current-number {
      font-size: 64px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      margin-bottom: 10px;
    }

    .current-patient {
      font-size: 16px;
      opacity: 0.9;
    }

    .no-token {
      font-size: 18px;
      opacity: 0.8;
    }

    /* Status Selector */
    .status-section {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .status-label {
      font-size: 13px;
      color: #7f8c8d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      display: block;
      font-weight: 600;
    }

    .status-select {
      width: 100%;
      padding: 14px;
      border: 2px solid #ecf0f1;
      border-radius: 10px;
      font-size: 15px;
      background: white;
      cursor: pointer;
      transition: border-color 0.3s;
    }

    .status-select:focus {
      outline: none;
      border-color: #27ae60;
    }

    .status-select:disabled {
      background: #f5f5f5;
      cursor: not-allowed;
    }

    /* Action Buttons */
    .actions-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .action-btn {
      padding: 18px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-next {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
      grid-column: span 2;
    }

    .btn-next:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(39, 174, 96, 0.3);
    }

    .btn-complete {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
    }

    .btn-complete:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(52, 152, 219, 0.3);
    }

    .btn-skip {
      background: #ecf0f1;
      color: #e74c3c;
      border: 2px solid #e74c3c;
    }

    .btn-skip:hover:not(:disabled) {
      background: #e74c3c;
      color: white;
    }

    /* Queue Section */
    .queue-section {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .queue-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .queue-title {
      font-size: 18px;
      font-weight: 700;
      color: #2c3e50;
    }

    .queue-count {
      background: #27ae60;
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .queue-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .queue-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 10px;
      border-left: 4px solid #27ae60;
    }

    .queue-item.next {
      background: #e8f8f0;
      border-left-color: #27ae60;
    }

    .queue-item-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .queue-token {
      font-size: 16px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: #2c3e50;
      background: white;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .queue-patient {
      font-size: 14px;
      color: #7f8c8d;
    }

    .queue-time {
      font-size: 12px;
      color: #95a5a6;
    }

    .queue-empty {
      text-align: center;
      padding: 30px;
      color: #7f8c8d;
    }

    /* Footer */
    .dashboard-footer {
      background: #ecf0f1;
      padding: 15px;
      text-align: center;
      font-size: 12px;
      color: #7f8c8d;
      margin-top: auto;
    }

    /* Message Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 25px;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }

    .toast.success { background: #27ae60; }
    .toast.error { background: #e74c3c; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Login Form (if not logged in) */
    .login-container {
      max-width: 400px;
      margin: 50px auto;
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      color: #2c3e50;
      text-align: center;
      margin-bottom: 30px;
    }

    .login-icon {
      font-size: 48px;
      text-align: center;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      color: #7f8c8d;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .form-input {
      width: 100%;
      padding: 14px;
      border: 2px solid #ecf0f1;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: #27ae60;
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(39, 174, 96, 0.3);
    }

    .login-error {
      color: #e74c3c;
      font-size: 14px;
      text-align: center;
      margin-top: 15px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .dashboard-header {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }

      .header-right {
        width: 100%;
        justify-content: center;
      }

      .location-grid {
        grid-template-columns: 1fr;
      }

      .actions-section {
        grid-template-columns: 1fr;
      }

      .btn-next {
        grid-column: span 1;
      }

      .current-number {
        font-size: 48px;
      }
    }
  </style>
</head>
<body class="pharmacy-dashboard">
  <div class="dashboard-wrapper">
    <!-- Login View -->
    <div id="loginView" style="display: block;">
      <div class="dashboard-header">
        <div class="header-logo">💊 MediNova Hospital - Pharmacy</div>
      </div>
      <div class="login-container">
        <div class="login-icon">👨‍⚕️</div>
        <div class="login-title">Pharmacy Staff Login</div>
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">Staff ID</label>
            <input type="text" class="form-input" id="staffId" placeholder="Enter Staff ID (e.g., PHARM001)" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="password" placeholder="Enter Password" required>
          </div>
          <button type="submit" class="login-btn">Login</button>
          <div class="login-error" id="loginError" style="display: none;"></div>
        </form>
      </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" style="display: none;">
      <!-- Header -->
      <div class="dashboard-header">
        <div class="header-left">
          <div class="header-logo">💊 MediNova Hospital</div>
          <div class="pharmacy-badge" id="pharmacyName">Pharmacy</div>
        </div>
        <div class="header-right">
          <div class="staff-info">
            <div class="staff-name" id="staffName">Staff Name</div>
            <div id="staffIdDisplay">ID: PHARM001</div>
          </div>
          <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="dashboard-main">
        <!-- Location Card -->
        <div class="location-card">
          <div class="location-title">📍 Pharmacy Location</div>
          <div class="location-grid">
            <div class="location-item">
              <div class="location-label">Block</div>
              <div class="location-value" id="locationBlock">A</div>
            </div>
            <div class="location-item">
              <div class="location-label">Floor</div>
              <div class="location-value" id="locationFloor">1</div>
            </div>
            <div class="location-item">
              <div class="location-label">Wing</div>
              <div class="location-value" id="locationWing">East</div>
            </div>
          </div>
        </div>

        <!-- Current Token Card -->
        <div class="current-token-card">
          <div class="current-label">Now Serving</div>
          <div class="current-number" id="currentToken">---</div>
          <div class="current-patient" id="currentPatient"></div>
        </div>

        <!-- Status Section -->
        <div class="status-section">
          <label class="status-label">Update Status</label>
          <select class="status-select" id="statusSelect" disabled>
            <option value="">-- Select Status --</option>
            <option value="processing">Processing</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>

        <!-- Action Buttons -->
        <div class="actions-section">
          <button class="action-btn btn-next" id="btnNext">
            📢 Call Next Patient
          </button>
          <button class="action-btn btn-complete" id="btnComplete" disabled>
            ✓ Complete
          </button>
          <button class="action-btn btn-skip" id="btnSkip" disabled>
            ✕ Skip
          </button>
        </div>

        <!-- Queue Section -->
        <div class="queue-section">
          <div class="queue-header">
            <div class="queue-title">🕐 Waiting Queue</div>
            <div class="queue-count" id="queueCount">0 waiting</div>
          </div>
          <div class="queue-list" id="queueList">
            <div class="queue-empty">No patients in queue</div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="dashboard-footer">
        MediNova Hospital - Pharmacy Token Management System
      </div>
    </div>
  </div>

  <script>
    // State
    let staffData = null;
    let currentTokenData = null;
    let queueData = [];
    let refreshInterval = null;

    // Initialize
    function init() {
      // Check if already logged in
      const savedData = sessionStorage.getItem('pharmacyStaffData');
      if (savedData) {
        staffData = JSON.parse(savedData);
        showDashboard();
      }

      // Setup event listeners
      document.getElementById('loginForm').addEventListener('submit', handleLogin);
      document.getElementById('logoutBtn').addEventListener('click', handleLogout);
      document.getElementById('btnNext').addEventListener('click', callNextPatient);
      document.getElementById('btnComplete').addEventListener('click', () => updateTokenStatus('completed'));
      document.getElementById('btnSkip').addEventListener('click', () => updateTokenStatus('cancelled'));
      document.getElementById('statusSelect').addEventListener('change', handleStatusChange);
    }

    // Handle login
    async function handleLogin(e) {
      e.preventDefault();
      const staffId = document.getElementById('staffId').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorDiv = document.getElementById('loginError');

      try {
        const response = await fetch('api/pharmacy_staff_login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ staff_id: staffId, password: password })
        });

        const data = await response.json();

        if (data.success) {
          staffData = data.data;
          sessionStorage.setItem('pharmacyStaffData', JSON.stringify(staffData));
          showDashboard();
        } else {
          errorDiv.textContent = data.message || 'Login failed';
          errorDiv.style.display = 'block';
        }
      } catch (error) {
        console.error('Login error:', error);
        errorDiv.textContent = 'Network error. Please try again.';
        errorDiv.style.display = 'block';
      }
    }

    // Show dashboard
    function showDashboard() {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('dashboardView').style.display = 'block';

      // Update UI with staff data
      document.getElementById('pharmacyName').textContent = staffData.pharmacy.name;
      document.getElementById('staffName').textContent = staffData.name;
      document.getElementById('staffIdDisplay').textContent = `ID: ${staffData.staff_id}`;
      document.getElementById('locationBlock').textContent = staffData.pharmacy.block;
      document.getElementById('locationFloor').textContent = staffData.pharmacy.floor;
      document.getElementById('locationWing').textContent = staffData.pharmacy.wing;

      // Load queue
      loadQueue();

      // Start auto-refresh
      refreshInterval = setInterval(loadQueue, 5000);
    }

    // Handle logout
    function handleLogout() {
      if (confirm('Are you sure you want to logout?')) {
        sessionStorage.removeItem('pharmacyStaffData');
        staffData = null;
        if (refreshInterval) clearInterval(refreshInterval);
        
        document.getElementById('dashboardView').style.display = 'none';
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('loginForm').reset();
        document.getElementById('loginError').style.display = 'none';
      }
    }

    // Load queue data
    async function loadQueue() {
      if (!staffData) return;

      try {
        const response = await fetch(`api/get_pharmacy_queue.php?pharmacy_id=${staffData.pharmacy_id}`);
        const data = await response.json();

        if (data.success) {
          queueData = data.data.queue.filter(t => t.status === 'waiting');
          renderQueue();
          
          // Check for current processing token
          const processingToken = data.data.queue.find(t => t.status === 'processing');
          if (processingToken) {
            currentTokenData = processingToken;
            updateCurrentTokenDisplay();
          }
        }
      } catch (error) {
        console.error('Error loading queue:', error);
      }
    }

    // Render queue list
    function renderQueue() {
      const queueList = document.getElementById('queueList');
      const queueCount = document.getElementById('queueCount');

      queueCount.textContent = `${queueData.length} waiting`;

      if (queueData.length === 0) {
        queueList.innerHTML = '<div class="queue-empty">No patients in queue</div>';
        return;
      }

      queueList.innerHTML = queueData.map((token, index) => `
        <div class="queue-item ${index === 0 ? 'next' : ''}">
          <div class="queue-item-left">
            <div class="queue-token">${token.token_number}</div>
            <div>
              <div class="queue-patient">${token.patient_name || '-'}</div>
              <div class="queue-time">Token at ${token.created_time}</div>
            </div>
          </div>
          ${index === 0 ? '<span style="color: #27ae60; font-weight: 600;">NEXT</span>' : ''}
        </div>
      `).join('');
    }

    // Call next patient
    async function callNextPatient() {
      if (currentTokenData) {
        showToast('Please complete or skip the current patient first', 'error');
        return;
      }

      if (queueData.length === 0) {
        showToast('No patients in queue', 'error');
        return;
      }

      const nextToken = queueData[0];
      await updateTokenStatusById(nextToken.id, 'processing');
    }

    // Update token status
    async function updateTokenStatus(status) {
      if (!currentTokenData) {
        showToast('No active token', 'error');
        return;
      }

      await updateTokenStatusById(currentTokenData.id, status);
    }

    // Update token status by ID
    async function updateTokenStatusById(tokenId, status) {
      try {
        const response = await fetch('api/update_pharmacy_token.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token_id: tokenId, status: status })
        });

        const data = await response.json();

        if (data.success) {
          showToast(data.message, 'success');
          
          if (status === 'processing') {
            currentTokenData = queueData.find(t => t.id === tokenId);
            queueData = queueData.filter(t => t.id !== tokenId);
          } else {
            currentTokenData = null;
          }

          updateCurrentTokenDisplay();
          renderQueue();
          loadQueue(); // Refresh from server
        } else {
          showToast(data.message || 'Update failed', 'error');
        }
      } catch (error) {
        console.error('Error updating token:', error);
        showToast('Network error', 'error');
      }
    }

    // Handle status dropdown change
    async function handleStatusChange(e) {
      const status = e.target.value;
      if (status && currentTokenData) {
        await updateTokenStatus(status);
        e.target.value = '';
      }
    }

    // Update current token display
    function updateCurrentTokenDisplay() {
      const tokenDisplay = document.getElementById('currentToken');
      const patientDisplay = document.getElementById('currentPatient');
      const statusSelect = document.getElementById('statusSelect');
      const btnComplete = document.getElementById('btnComplete');
      const btnSkip = document.getElementById('btnSkip');
      const btnNext = document.getElementById('btnNext');

      if (currentTokenData) {
        tokenDisplay.textContent = currentTokenData.token_number;
        patientDisplay.textContent = currentTokenData.patient_name || '';
        statusSelect.disabled = false;
        btnComplete.disabled = false;
        btnSkip.disabled = false;
        btnNext.disabled = true;
      } else {
        tokenDisplay.textContent = '---';
        patientDisplay.textContent = '';
        statusSelect.disabled = true;
        statusSelect.value = '';
        btnComplete.disabled = true;
        btnSkip.disabled = true;
        btnNext.disabled = queueData.length === 0;
      }
    }

    // Show toast notification
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    // Initialize on page load
    window.addEventListener('load', init);

    // Cleanup on unload
    window.addEventListener('beforeunload', () => {
      if (refreshInterval) clearInterval(refreshInterval);
    });
  </script>
</body>
</html>
